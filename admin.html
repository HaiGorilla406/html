<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Vxlancity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
        }
        .admin-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-section {
            margin-bottom: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }
        .project-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .project-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .project-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        .status-online { background: #3ba55c; color: white; }
        .status-offline { background: #ed4245; color: white; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="contact-box">
            <h2>Admin Login</h2>
            <p style="font-size: 0.8rem; margin-bottom: 15px; opacity: 0.7;">Use your Supabase Auth credentials</p>
            <input type="email" id="admin-email" placeholder="E-Mail" style="margin-bottom: 10px; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff;">
            <input type="password" id="admin-pass" placeholder="Passwort" style="margin-bottom: 10px; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff;">
            <button class="btn-primary" id="login-btn" onclick="handleLogin()" style="width: 100%;">Login</button>
            <p id="login-error" style="color: #ff4444; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div class="admin-container" id="admin-main" style="display: none;">
        <div class="admin-header">
            <h1>Admin Cloud Dashboard <span id="db-status" class="status-badge status-offline">Connecting...</span></h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="background: transparent; border: 1px solid #444;" onclick="handleLogout()">Logout</button>
                <a href="index.html" class="btn-primary">Back to Site</a>
            </div>
        </div>

        <div class="admin-section">
            <h2>Website Config (Cloud)</h2>
            <p>These settings are stored in Supabase and visible to all visitors.</p>
            
            <div style="margin-bottom: 15px;">
                <label>Discord User ID (for Lanyard)</label>
                <input type="text" id="discord-userid" placeholder="e.g. 123456789012345678" style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Discord Webhook (for Contact Form)</label>
                <input type="text" id="webhook-url" placeholder="https://discord.com/api/webhooks/..." style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Terminal Social Links (Comma separated)</label>
                <input type="text" id="terminal-socials" placeholder="https://github.com/vxlancity, https://discord.gg/..." style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Footer Social Links (Comma separated)</label>
                <input type="text" id="footer-socials" placeholder="https://github.com/vxlancity, https://youtube.com/..." style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Hero Title</label>
                <input type="text" id="hero-title" placeholder="Vxlancity Dev" style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Site Progress (%) <span id="progress-display" style="color: var(--accent-color); font-weight: 700;"></span></label>
                <input type="range" id="site-progress" min="0" max="100" value="60" style="width: 100%; accent-color: var(--accent-color);" oninput="document.getElementById('progress-display').textContent = this.value + '%'">
            </div>

            <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="has-nitro" style="width: 20px; height: 20px; accent-color: var(--accent-color);">
                <label for="has-nitro" style="margin: 0; cursor: pointer;">Show Discord Nitro Badge</label>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>Favorite Anime</label>
                <input type="text" id="favorite-anime" placeholder="e.g. One Piece, Naruto...">
            </div>

            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
                <h3 style="font-size: 1.1rem; margin-bottom: 10px;">Visitor Counter</h3>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span id="admin-visit-count" style="font-family: monospace; font-size: 1.2rem; color: var(--accent-color);">0</span>
                    <button class="btn-primary" style="background: #333; padding: 8px 15px; font-size: 0.85rem;" onclick="resetCounter()">Reset Counter</button>
                </div>
            </div>

            <button class="btn-primary" style="margin-top: 30px;" onclick="saveConfig()">Save All Configs to Cloud</button>
        </div>

        <div class="admin-section">
            <h2>Manage Projects (Cloud)</h2>
            <form class="project-form" onsubmit="addProject(event)">
                <input type="text" id="proj-title" placeholder="Project Title" required>
                <input type="text" id="proj-desc" placeholder="Short Description" required>
                <input type="text" id="proj-tags" placeholder="Tags (comma separated)">
                <input type="text" id="proj-image" placeholder="Image URL (e.g. assets/project1.png)" required>
                <input type="text" id="proj-links" placeholder="Project Links (comma separated)">
                <input type="text" id="proj-badge" placeholder="Badge Text (Optional)">
                <button type="submit" id="proj-submit-btn" class="btn-primary">Add Project to Cloud</button>
            </form>
            <div class="project-list" id="project-list"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iutdotykpgrdhgvqtnjx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1dGRvdHlrcGdyZGhndnF0bmp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDM1NzAsImV4cCI6MjA5Mjk3OTU3MH0.q2zkK2ob_ohmG_o7o4q2r2_DbgLgWivTZ6Z-UVXoEJg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let editingProjectId = null;

        // Check for existing session on load
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showDashboard();
            }
        }
        checkSession();

        async function handleLogin() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-pass').value;
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errEl.style.display = 'none';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showDashboard();
            } catch (error) {
                errEl.textContent = error.message;
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-main').style.display = 'block';
            initDashboard();
        }

        async function initDashboard() {
            try {
                document.getElementById('db-status').textContent = 'Cloud Online';
                document.getElementById('db-status').className = 'status-badge status-online';

                loadConfig();
                renderProjects();
            } catch (e) {
                console.error(e);
                document.getElementById('db-status').textContent = 'Error';
                document.getElementById('db-status').className = 'status-badge status-offline';
            }
        }

        async function loadConfig() {
            const { data, error } = await supabaseClient.from('site_config').select('*');
            if (data) {
                const config = Object.fromEntries(data.map(c => [c.key, c.value]));
                document.getElementById('discord-userid').value = config.discord_id || '';
                document.getElementById('webhook-url').value = config.webhook || '';
                document.getElementById('terminal-socials').value = config.terminal_socials || '';
                document.getElementById('footer-socials').value = config.footer_socials || '';
                document.getElementById('hero-title').value = config.hero_title || '';
                document.getElementById('site-progress').value = config.site_progress || '60';
                document.getElementById('progress-display').textContent = (config.site_progress || '60') + '%';
                document.getElementById('has-nitro').checked = config.has_nitro === 'true';
                document.getElementById('favorite-anime').value = config.favorite_anime || '';
                document.getElementById('admin-visit-count').textContent = config.page_views || '0';
            }
        }

        async function resetCounter() {
            if (!confirm('Are you sure you want to reset the visitor counter to 0?')) return;
            const { error } = await supabaseClient.from('site_config').upsert({ key: 'page_views', value: '0' });
            if (error) alert('Error: ' + error.message);
            else {
                document.getElementById('admin-visit-count').textContent = '0';
                alert('Counter reset successfully!');
            }
        }

        async function saveConfig() {
            const configs = [
                { key: 'discord_id', value: document.getElementById('discord-userid').value },
                { key: 'webhook', value: document.getElementById('webhook-url').value },
                { key: 'terminal_socials', value: document.getElementById('terminal-socials').value },
                { key: 'footer_socials', value: document.getElementById('footer-socials').value },
                { key: 'hero_title', value: document.getElementById('hero-title').value },
                { key: 'site_progress', value: document.getElementById('site-progress').value },
                { key: 'has_nitro', value: document.getElementById('has-nitro').checked ? 'true' : 'false' },
                { key: 'favorite_anime', value: document.getElementById('favorite-anime').value }
            ];

            const { error } = await supabaseClient.from('site_config').upsert(configs);
            if (error) alert('Error saving config: ' + error.message);
            else alert('Configs saved to Cloud successfully!');
        }

        async function renderProjects() {
            const { data, error } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('project-list');
            if (data) {
                window.currentProjects = data;
                list.innerHTML = data.map((p, index) => `
                    <div class="project-item">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div style="display: flex; flex-direction: column; gap: 2px;">
                                <button onclick="moveProject(${index}, -1)" style="background: none; border: none; cursor: ${index === 0 ? 'default' : 'pointer'}; color: white; opacity: ${index === 0 ? '0.2' : '0.8'};" ${index === 0 ? 'disabled' : ''}>▲</button>
                                <button onclick="moveProject(${index}, 1)" style="background: none; border: none; cursor: ${index === data.length - 1 ? 'default' : 'pointer'}; color: white; opacity: ${index === data.length - 1 ? '0.2' : '0.8'};" ${index === data.length - 1 ? 'disabled' : ''}>▼</button>
                            </div>
                            <span style="font-weight: 600;">${p.title}</span>
                        </div>
                        <div>
                            <button class="btn-primary" style="padding: 5px 10px; margin-right: 10px; background: transparent; border: 1px solid var(--accent-color);" onclick="editProject(${p.id})">Edit</button>
                            <button class="delete-btn" onclick="deleteProject(${p.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function moveProject(index, direction) {
            const projects = window.currentProjects;
            const p1 = projects[index];
            const p2 = projects[index + direction];
            
            if (!p1 || !p2) return;

            // Swap their created_at values to change their order
            const tempTime = p1.created_at;
            const { error: e1 } = await supabaseClient.from('projects').update({ created_at: p2.created_at }).eq('id', p1.id);
            const { error: e2 } = await supabaseClient.from('projects').update({ created_at: tempTime }).eq('id', p2.id);

            if (e1 || e2) {
                alert('Error reordering projects.');
            }
            renderProjects();
        }

        async function addProject(e) {
            e.preventDefault();
            const projData = {
                title: document.getElementById('proj-title').value,
                description: document.getElementById('proj-desc').value,
                tags: document.getElementById('proj-tags').value.split(',').map(t => t.trim()),
                image_url: document.getElementById('proj-image').value,
                badge: document.getElementById('proj-badge').value,
                links: document.getElementById('proj-links').value.split(',').map(l => l.trim()).filter(l => l)
            };

            let res;
            if (editingProjectId) {
                res = await supabaseClient.from('projects').update(projData).eq('id', editingProjectId);
                editingProjectId = null;
                document.getElementById('proj-submit-btn').textContent = 'Add Project to Cloud';
            } else {
                res = await supabaseClient.from('projects').insert([projData]);
            }

            if (res.error) alert('Error: ' + res.error.message);
            else {
                renderProjects();
                e.target.reset();
            }
        }

        async function editProject(id) {
            const { data, error } = await supabaseClient.from('projects').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('proj-title').value = data.title;
                document.getElementById('proj-desc').value = data.description;
                document.getElementById('proj-tags').value = (data.tags || []).join(', ');
                document.getElementById('proj-image').value = data.image_url || '';
                document.getElementById('proj-badge').value = data.badge || '';
                document.getElementById('proj-links').value = (data.links || []).join(', ');
                
                editingProjectId = id;
                document.getElementById('proj-submit-btn').textContent = 'Update Project in Cloud';
            }
        }

        async function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project?')) return;
            const { error } = await supabaseClient.from('projects').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else renderProjects();
        }
    </script>
</body>
</html>
