<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiGorilla406 | Full Stack Developer Portfolio</title>
    <meta name="description" content="Portfolio von HaiGorilla406 – Full‑Stack Entwickler & Designer. Entdecke meine Projekte und Skills.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Damion&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="kleinbild.png">
    <link rel="apple-touch-icon" href="kleinbild.png">

    <!-- Primary Meta Tags -->
    <meta name="title" content="HaiGorilla406 | Full Stack Developer Portfolio">
    <meta name="description" content="Professional developer portfolio of HaiGorilla406. Crafting digital experiences with precision and passion.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://haigorilla406.github.io/">
    <meta property="og:title" content="HaiGorilla406 | Full Stack Developer Portfolio">
    <meta property="og:description" content="Professional developer portfolio of HaiGorilla406. Crafting digital experiences with precision and passion.">
    <meta property="og:image" content="kleinbild.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://haigorilla406.github.io/">
    <meta property="twitter:title" content="HaiGorilla406 | Full Stack Developer Portfolio">
    <meta property="twitter:description" content="Professional developer portfolio of HaiGorilla406. Crafting digital experiences with precision and passion.">
    <meta property="twitter:image" content="kleinbild.png">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="custom-cursor">
    <!-- Code Rain Background -->
    <canvas id="code-rain"></canvas>
    <div class="bg-orbs">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>
    <div class="grain"></div>

    <!-- Dev Progress Banner -->
    <div class="dev-progress-banner">
        <div class="dev-progress-inner">
            <span class="dev-progress-label">🚧 Site in Entwicklung</span>
            <div class="dev-progress-bar">
                <div class="dev-progress-fill" style="width: 60%;"></div>
            </div>
            <span class="dev-progress-pct">75%</span>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div id="cursor"></div>
    <div id="cursor-blur"></div>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-content">
            <div class="logo">HaiGorilla406</div>
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="nav-cta" style="display: flex; align-items: center; gap: 20px;">
                <div class="lang-toggle" style="font-family: monospace; font-size: 0.9rem; cursor: pointer; display: flex; gap: 5px;">
                    <span class="lang-btn active" data-lang="en" style="color: var(--accent-color);">EN</span>
                    <span style="color: var(--muted-color);">/</span>
                    <span class="lang-btn" data-lang="de" style="color: var(--muted-color); transition: 0.3s;">DE</span>
                </div>
                <a href="#contact" class="btn-primary">Hire Me</a>
            </div>
        </div>
    </nav>

    <!-- Rest deiner Seite bleibt unverändert -->
    <!-- (Hero, About, Tech Stack, Projects, Contact, Footer) -->

    <footer>
        <div class="footer-content" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <p style="margin: 0;">&copy; 2026 HaiGorilla406. All rights reserved.</p>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div id="visitor-counter" style="font-family: monospace; font-size: 0.85rem; color: var(--muted-color); background: rgba(255,255,255,0.03); padding: 5px 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--accent-color);">VISITS:</span>
                    <span id="visit-count">...</span>
                </div>
                <div class="lang-toggle footer-lang" style="font-family: monospace; font-size: 0.9rem; cursor: pointer; display: flex; gap: 5px;">
                    <span class="lang-btn active" data-lang="en" style="color: var(--accent-color);">EN</span>
                    <span style="color: var(--muted-color);">/</span>
                    <span class="lang-btn" data-lang="de" style="color: var(--muted-color); transition: 0.3s;">DE</span>
                </div>
            </div>
            <div class="socials" id="footer-social-container"></div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
